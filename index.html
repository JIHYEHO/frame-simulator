<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지혜의 액자 시뮬레이터 v9.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; padding: 20px; background: #f0f2f5; margin: 0; height: 100vh; box-sizing: border-box; }
        .controls { width: 340px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); margin-right: 20px; flex-shrink: 0; overflow-y: auto; display: flex; flex-direction: column; }
        .preview { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #e2e8f0; border-radius: 12px; padding: 20px; }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        h3 { margin-top: 0; color: #4A90E2; border-bottom: 2px solid #4A90E2; padding-bottom: 10px; }
        h4 { margin: 0 0 8px 0; font-size: 14px; color: #555; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 12px; color: #666; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .btn-group { margin-top: auto; display: flex; flex-direction: column; gap: 8px; border-top: 2px solid #eee; padding-top: 15px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 14px; transition: 0.2s; }
        .btn-blue { background: #4A90E2; color: white; }
        .btn-green { background: #27ae60; color: white; opacity: 0.5; }
        #status { font-size: 10px; margin-bottom: 5px; font-weight: bold; color: #e67e22; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .color-chip { width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-chip.active { border-color: #4A90E2; }
    </style>
</head>
<body>

<div class="controls">
    <h3>🖼️ 시뮬레이터 v9.0</h3>
    <div id="status">⌛ 폰트 데이터를 불러오는 중...</div>
    
    <div class="control-group">
        <h4>1. 규격 설정 (mm)</h4>
        <div style="display: flex; gap: 8px;">
            <div style="flex: 1;"><label>가로</label><input type="number" id="width_mm" value="2400" oninput="draw()"></div>
            <div style="flex: 1;"><label>세로</label><input type="number" id="height_mm" value="1200" oninput="draw()"></div>
        </div>
    </div>

    <div class="control-group">
        <h4>2. 문구 및 레이아웃</h4>
        <input type="text" id="molding_text" value="G-DESIGN STUDIO" oninput="draw()">
        
        <label style="margin-top:10px;">자간/크기 조절</label>
        <input type="range" id="letter_spacing" min="-10" max="50" value="0" oninput="draw()">
        <input type="number" id="text_size_pt" value="45" style="margin-top:5px;" oninput="draw()">

        <label style="margin-top:10px;">정렬 (좌측/중앙/우측)</label>
        <select id="text_align" onchange="draw()">
            <option value="left">좌측 정렬 (여백 20mm)</option>
            <option value="center" selected>중앙 정렬</option>
            <option value="right">우측 정렬 (여백 20mm)</option>
        </select>
    </div>

    <div class="control-group">
        <h4>3. 몰딩 색상 선택</h4>
        <div class="color-grid" id="m-colors"></div>
    </div>

    <div class="btn-group">
        <button class="btn btn-blue" onclick="savePNG()">시안(PNG) 저장</button>
        <button class="btn btn-green" id="svg_btn" onclick="saveOutlineSVG()" disabled>🔥 커팅용 벡터(SVG) 저장</button>
        <small style="font-size: 10px; color: #888; text-align: center;">※ 벡터 저장 시 아웃라인이 자동 생성됩니다.</small>
    </div>
</div>

<div class="preview">
    <div id="canvas-container"><canvas id="mainCanvas"></canvas></div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let curMColor = '#5C7795', loadedFont = null;

    const mColors = ['#5C7795', '#A8B0B3', '#91846E', '#594F4B'];
    const mNames = ['민트', '실버', '골드', '초코'];

    // 웹서버에서는 이 경로가 보안 에러 없이 바로 작동합니다.
    const FONT_URL = 'https://cdn.jsdelivr.net/gh/googlefonts/noto-fonts@master/hinted/ttf/NotoSansKR/NotoSansKR-Bold.ttf';

    async function init() {
        // 색상칩 초기화
        const mg = document.getElementById('m-colors');
        mColors.forEach((c, i) => {
            const wrap = document.createElement('div');
            wrap.style.textAlign = 'center';
            const d = document.createElement('div');
            d.className = `color-chip ${i===0?'active':''}`;
            d.style.backgroundColor = c;
            d.onclick = (e) => { 
                curMColor = c; 
                mg.querySelectorAll('.color-chip').forEach(cc => cc.classList.remove('active'));
                d.classList.add('active');
                draw(); 
            };
            wrap.appendChild(d);
            const label = document.createElement('div'); label.innerText = mNames[i]; label.style.fontSize = '10px';
            wrap.appendChild(label); mg.appendChild(wrap);
        });

        // 폰트 로딩 (진짜 벡터 데이터 추출용)
        opentype.load(FONT_URL, function(err, font) {
            if (err) {
                document.getElementById('status').innerText = '❌ 오류: 새로고침 해주세요.';
            } else {
                loadedFont = font;
                document.getElementById('status').innerText = '✅ 준비 완료 (벡터 저장 가능)';
                document.getElementById('status').style.color = '#27ae60';
                document.getElementById('svg_btn').disabled = false;
                document.getElementById('svg_btn').style.opacity = "1";
                draw();
            }
        });
    }

    function draw() {
        const w_mm = parseFloat(document.getElementById('width_mm').value) || 100;
        const h_mm = parseFloat(document.getElementById('height_mm').value) || 100;
        const text = document.getElementById('molding_text').value;
        const spacing = parseFloat(document.getElementById('letter_spacing').value);
        const align = document.getElementById('text_align').value;
        
        const scale = Math.min(700 / w_mm, 500 / h_mm);
        canvas.width = w_mm * scale; canvas.height = h_mm * scale;

        // 시안용 그리기
        ctx.fillStyle = curMColor; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#EFEFEF"; ctx.fillRect(40*scale, 80*scale, canvas.width - 80*scale, canvas.height - 120*scale);

        if(text.trim()) {
            const pt = parseFloat(document.getElementById('text_size_pt').value) || 40;
            ctx.font = `bold ${pt * 1.33 * scale}px 'Noto Sans KR'`;
            ctx.fillStyle = "#ffffff";
            ctx.textBaseline = 'middle';
            ctx.letterSpacing = `${spacing * scale}px`;
            
            const margin20 = 20 * scale;
            const x = (align === 'left') ? 40*scale + margin20 : (align === 'center' ? canvas.width/2 : canvas.width - 40*scale - margin20);
            ctx.textAlign = align;
            ctx.fillText(text, x, 40*scale, canvas.width - 80*scale - 40*scale);
        }
    }

    function savePNG() {
        const a = document.createElement('a'); a.download = '액자시안.png';
        a.href = canvas.toDataURL(); a.click();
    }

    function saveOutlineSVG() {
        if(!loadedFont) return;
        const text = document.getElementById('molding_text').value;
        const w = parseFloat(document.getElementById('width_mm').value);
        const h = 80; // 상단 몰딩 가이드 박스 높이
        const pt = parseFloat(document.getElementById('text_size_pt').value);
        const spacing = parseFloat(document.getElementById('letter_spacing').value);
        const align = document.getElementById('text_align').value;

        // 폰트 경로 계산 (자간 반영)
        const path = loadedFont.getPath(text, 0, 0, pt, { letterSpacing: spacing / 10 });
        const bbox = path.getBoundingBox();
        const textW = bbox.x2 - bbox.x1;
        
        // 수평 위치 계산 (여백 20mm 반영)
        let xPos;
        const margin20 = 20;
        if (align === 'left') xPos = 40 + margin20 - bbox.x1;
        else if (align === 'center') xPos = (w/2) - (textW/2) - bbox.x1;
        else xPos = (w - 40 - margin20) - textW - bbox.x1;

        const yPos = (h/2) + ((bbox.y2 - bbox.y1)/4);
        const finalPath = loadedFont.getPath(text, xPos, yPos, pt, { letterSpacing: spacing / 10 }).toPathData();

        const svg = `
<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">
    <rect x="0" y="0" width="${w}" height="${h}" fill="none" stroke="red" stroke-width="0.1" />
    <path d="${finalPath}" fill="none" stroke="black" stroke-width="0.2" />
</svg>`.trim();

        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([svg], {type: 'image/svg+xml'}));
        a.download = `커팅용_${text}.svg`; a.click();
    }

    init();
</script>
</body>
</html>
